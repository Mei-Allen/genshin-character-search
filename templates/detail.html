<link
href="https://fonts.googleapis.com/css2?family=Forum&family=IM+Fell+English+SC&display=swap"
rel="stylesheet">

<body style="background-color:#f5f5f5;">

<div
style="
width:90%;
max-width:1200px;
margin:30px auto;
padding:30px;

background:
radial-gradient(
circle at top center,
white,
{{ color }}
);
border-radius:25px;
box-shadow:0px 0px 20px lightgray;
">

<div
style="
display:flex;
gap:40px;
align-items:flex-start;
">

<div
style="
width:400px;
text-align:center;
">
<img
src="/static/genshin.image/{{ row['character_name'] }}.png"
style="
width:350px;
display:block;
margin:auto;
">

<h1
style="
font-family:'IM Fell English SC', serif;
color: #2d2039;
text-align:center;
">
{{ row['character_name'] }}
</h1>

</div>

<div
style="
font-family:'Forum', serif;
flex:1;
padding-top:40px;
display:grid;
grid-template-columns:1fr 1fr;
column-gap:40px;
">
{% for key, value in row.items() %}
    <p
    style="
    margin:8px 0;
    font-size:20px;
    line-height:1.3;
    text-shadow:
    0.3px 0.3px 0px rgba(0,0,0,0.15);
    ">
    {{ key.replace("_"," ").title() }}: {{ value }}
    </p>
{% endfor %}
</div>
</div>
</div>
</body>
